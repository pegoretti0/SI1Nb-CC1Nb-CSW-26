<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Aula-09</title>
</head>
<body>

<h2>Formulario</h2>

<form>
<table border="1" width="700" cellspacing="0" cellpadding="8">

<tr>
    <td width="180">Nome:</td>
    <td><input type="text" size="50" placeholder="Digite seu nome"></td>
</tr>

<tr>
    <td>E-mail pessoal:</td>
    <td><input type="email" size="50"></td>
</tr>

<tr>
    <td>E-mail (pattern):</td>
    <td><input type="email" size="50" placeholder="Digite seu email com @" pattern=".+@.+\..+"></td>
</tr>

<tr>
    <td>Senha:</td>
    <td><input type="password" size="50"></td>
</tr>

<tr>
    <td>Idade:</td>
    <td><input type="number" size="5"></td>
</tr>

<tr>
    <td>Deixe um comentário:</td>
    <td><textarea cols="55" rows="5"></textarea></td>
</tr>

<tr>
    <td valign="top">
        <b>Matéria de interesse:</b><br><br>
        <input type="checkbox"> Backend<br>
        <input type="checkbox"> FrontEnd<br>
        <input type="checkbox"> FullStack
    </td>

    <td valign="top">
        <b>Tipo de Viagem:</b><br><br>
        <input type="radio" name="viagem"> Negócios<br>
        <input type="radio" name="viagem"> Lazer<br>
        <input type="radio" name="viagem"> Turismo<br>
        <input type="radio" name="viagem"> Acadêmico
    </td>
</tr>

<tr>
    <td valign="top">
        <b>Esporte favorito:</b><br><br>
        <select size="4">
            <option>Futebol</option>
            <option>Basquete</option>
            <option>Vôlei</option>
            <option>Tênis</option>
        </select>
    </td>

    <td valign="top">
        <b>Investimentos:</b><br><br>
        <select>
            <option>Poupança</option>
            <option>Ações</option>
            <option>Criptomoedas</option>
        </select>
    </td>
</tr>

<tr>
    <td>
        Escolha uma cor:
        <input type="color">
    </td>

    <td>
        Selecione um arquivo:
        <input type="file">
    </td>
</tr>

<tr>
    <td colspan="2">
        Data e Hora envio:
        <input type="datetime-local">
    </td>
</tr>

<tr>
    <td>
        <input type="submit" value="Enviar">
    </td>
    <td>
        <input type="reset" value="Limpar">
    </td>
</tr>

</table>
</form>

</body>
</html>
